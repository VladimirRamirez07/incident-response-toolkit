version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: soc_pass
      POSTGRES_DB: soc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://soc_user:soc_pass@db:5432/soc_db
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: